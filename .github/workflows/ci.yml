name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dashfetchr
          POSTGRES_PASSWORD: dashfetchr
          POSTGRES_DB: dashfetchr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dashfetchr -d dashfetchr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Download modules
        run: go mod download

      - name: Unit tests
        run: go test ./... -count=1

      - name: Apply migrations
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}/migrations:/migrations" \
            migrate/migrate:v4.17.1 \
            -path /migrations \
            -database "postgres://dashfetchr:dashfetchr@localhost:5432/dashfetchr?sslmode=disable" \
            up

      - name: Integration tests
        env:
          DATABASE_URL: postgres://dashfetchr:dashfetchr@localhost:5432/dashfetchr?sslmode=disable
        run: go test -tags=integration ./internal/infra/postgres/... -count=1 -v

      - name: Build binaries
        run: |
          go build -o /dev/null ./cmd/api
          go build -o /dev/null ./cmd/dispatcher
          go build -o /dev/null ./cmd/webhook-listener
